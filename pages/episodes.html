  <body class="min-h-screen flex flex-col">
    <header class="flex items-center h-15 bg-[#3c3e44] sticky top-0">
      <div class="container mx-auto p-4 flex">
        <a href="../index.html" class="block">
          <img src="../img/Logo.webp" alt="header-logo" class="w-50 h-15" />
        </a>
        <nav class="flex items-center gap-20 ml-25">
          <a
            href="../index.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >

          </a>
          <a
            href="../pages/episodes.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Episodes

          <a
            href="../pages/locations.html"

          >
            Locations
          </a>
        </nav>
      </div>
    </header>

    <main class="flex-1">
      <div
        class="flex flex-col md:flex-row items-center justify-center gap-4 my-12 max-w-4xl mx-auto px-4"
      >
        <form class="relative w-full flex-1" id="search-form">
          <input
            type="search"
            name="name"
            placeholder="Search episodes..."
            class="w-full pl-5 pr-12 py-3 bg-[#3c3e44] text-white rounded-xl outline-none border-2 border-transparent focus:border-orange-400 transition-all"
          />
          <button
            type="submit"
            class="absolute right-0 top-0 h-full px-4 text-gray-400 hover:text-orange-400 cursor-pointer"
          >
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </form>

        <form id="sort-form" class="w-auto">
          <div class="relative">
            <select
              name="sort"
              id="sort-select"
              class="w-full md:w-48 px-4 py-3 bg-[#3c3e44] text-white rounded-xl outline-none border-2 border-transparent focus:border-orange-400 cursor-pointer appearance-none shadow-lg"
            >
              <option value="" disabled>Sort by...</option>
              <option value="air_date:1" selected>Oldest</option>
              <option value="air_date:-1">Newest</option>
            </select>
            <i
              class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs"
            ></i>
          </div>
        </form>
      </div>

      <div class="container mx-auto p-4 flex">
        <div
          class="flex flex-wrap gap-6 justify-center mb-12"
          id="episodes-list"
        >

      <div class="flex justify-center my-12">

          id="load-more-btn"
          type="button"
          class="inline-flex items-center gap-3 rounded-xl bg-[#3c3e44] px-8 py-3 text-sm font-bold text-white shadow-lg duration-200 hover:-translate-y-0.5 hover:border-orange-400 hover:bg-orange-500/20 hover:text-orange-300 cursor-pointer"

          <i class="fa-solid fa-rotate-right"></i>
