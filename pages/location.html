<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Locations</title>
  </head>
  <body class="min-h-screen flex flex-col">
    <header class="flex items-center h-15 bg-[#3c3e44] sticky top-0">
      <div class="container mx-auto p-4 flex">
        <a href="../index.html" class="block">
          <img src="../img/Logo.webp" alt="header-logo" class="w-50 h-15" />
        </a>
        <nav class="flex items-center gap-20 ml-25">
          <a
            href="../index.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Characters
          </a>
          <a
            href="../pages/episodes.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Episodes
          </a>
          <a
            href="../pages/locations.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Locations
          </a>
        </nav>
      </div>
    </header>
    <main class="flex-1">
      <div
        class="flex flex-col md:flex-row items-center justify-center gap-4 my-12 max-w-4xl mx-auto px-4"
      >
        <form class="relative w-full flex-1" id="search-form">
          <input
            type="search"
            name="name"
            placeholder="Search locations..."
            class="w-full pl-5 pr-12 py-3 bg-[#3c3e44] text-white rounded-xl outline-none border-2 border-transparent focus:border-orange-400 transition-all"
          />
          <button
            type="submit"
            class="absolute right-0 top-0 h-full px-4 text-gray-400 hover:text-orange-400 cursor-pointer"
          >
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </form>

        <form id="sort-form" class="w-auto">
          <div class="relative">
            <select
              name="sort"
              class="w-full md:w-48 px-4 py-3 bg-[#3c3e44] text-white rounded-xl outline-none border-2 border-transparent focus:border-orange-400 cursor-pointer appearance-none shadow-lg"
            >
              <option value="" disabled selected>Sort by...</option>
              <option value="name:1">Name A-Z</option>
              <option value="name:-1">Name Z-A</option>
            </select>
            <i
              class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs"
            ></i>
          </div>
        </form>
      </div>

      <section class="flex-1 py-10 px-4">
        <div class="container mx-auto p-4">
          <div
            id="location-details"
            class="flex flex-wrap justify-center gap-6"
          >
            <article
              class="max-w-4xl mx-auto bg-[#3c3e44] rounded-2xl shadow-2xl p-8"
            >
              <h1 class="text-4xl font-black text-white mb-4">
                Citadel of Ricks
              </h1>
              <p class="text-lg text-orange-400 font-bold mb-2">
                Space station
              </p>
              <p class="text-gray-400 text-sm mb-6">
                <i class="fa-solid fa-globe mr-2"></i>
                unknown
              </p>
              <div class="border-t border-gray-600 pt-6">
                <h2 class="text-xl font-bold text-white mb-4">Residents (2)</h2>
                <p class="text-gray-400 text-sm">
                  Adjudicator Rick, Alien Morty
                </p>
              </div>
            </article>
          </div>
        </div>

        <div class="flex justify-center my-12">
          <button
            id="load-more-btn"
            type="button"
            class="inline-flex items-center gap-3 rounded-xl bg-[#3c3e44] px-8 py-3 text-sm font-bold text-white shadow-lg duration-200 hover:-translate-y-0.5 hover:border-orange-400 hover:bg-orange-500/20 hover:text-orange-300 cursor-pointer"
          >
            <i class="fa-solid fa-rotate-right"></i>
            Load more
          </button>
        </div>
      </section>
    </main>

    <footer class="text-center text-gray-400 text-sm space-y-2 mb-2 mt-10">
      <p>© 2026 Rick and Morty API</p>
      <a
        href="https://github.com/IhorAbovian"
        class="hover:underline"
        target="_blank"
      >
        <p>Made by Ihor Abovian</p>
      </a>
    </footer>
    <script src="../js/location.js" defer=""></script>
  </body>
</html>
