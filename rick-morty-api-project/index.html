<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Rick and Morty</title>
  </head>
  <body class="min-h-screen flex flex-col">
    <header class="flex items-center h-15 bg-[#3c3e44] sticky top-0">
      <div class="container mx-auto p-4 flex">
        <a href="#" class="block">
          <img src="./img/Logo.webp" alt="header-logo" class="w-50 h-15" />
        </a>
        <nav class="flex items-center gap-20 ml-25 coursor-pointer">
          <a
            href="../index.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Characters
          </a>
          <a
            href="./pages/episodes.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Episodes
          </a>
          <a
            href="./pages/locations.html"
            class="text-white font-semibold hover:text-orange-400 transition-colors"
          >
            Locations
          </a>
        </nav>
      </div>
    </header>
    <main class="flex-1">
      <div
        class="flex flex-col md:flex-row items-center justify-center gap-4 my-12 max-w-4xl mx-auto px-4"
      >
        <form class="relative w-full flex-1" id="search-form">
          <input
            type="search"
            name="name"
            placeholder="Search characters..."
            class="w-full pl-5 pr-12 py-3 bg-[#3c3e44] text-white rounded-xl outline-none border-2 border-transparent focus:border-orange-400 transition-all"
          />
          <button
            type="submit"
            class="absolute right-0 top-0 h-full px-4 text-gray-400 hover:text-orange-400 cursor-pointer"
          >
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </form>

        <form id="sort-form" class="w-auto">
          <div class="relative">
            <select
              name="sort"
              class="w-full md:w-48 px-4 py-3 bg-[#3c3e44] text-white rounded-xl outline-none border-2 border-transparent focus:border-orange-400 cursor-pointer appearance-none shadow-lg"
            >
              <option value="" disabled selected>Sort by...</option>
              <option value="name:1">Name A-Z</option>
              <option value="name:-1">Name Z-A</option>
            </select>
            <i
              class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs"
            ></i>
          </div>
        </form>
      </div>

      <section>
        <div class="container mx-auto p-4 flex gap-8">
          <!-- Sidebar -->
          <aside class="w-60 shrink-0">
            <form
              id="filter-form"
              class="bg-[#3c3e44] rounded-xl p-4 sticky top-20"
            >
              <h2 class="text-white font-bold text-lg mb-4">Filters</h2>

              <!-- Status Filter -->
              <fieldset class="mb-6">
                <legend
                  class="text-gray-400 text-xs font-semibold uppercase mb-3"
                >
                  Status
                </legend>
                <div class="flex flex-col gap-2">
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="status"
                      value=""
                      checked
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span>All</span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="status"
                      value="Alive"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span class="flex items-center gap-2">
                      <span class="h-2 w-2 rounded-full bg-green-500"></span>
                      Alive
                    </span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="status"
                      value="Dead"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span class="flex items-center gap-2">
                      <span class="h-2 w-2 rounded-full bg-red-500"></span>
                      Dead
                    </span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="status"
                      value="unknown"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span class="flex items-center gap-2">
                      <span class="h-2 w-2 rounded-full bg-gray-500"></span>
                      Unknown
                    </span>
                  </label>
                </div>
              </fieldset>

              <!-- Gender Filter -->
              <fieldset class="mb-6">
                <legend
                  class="text-gray-400 text-xs font-semibold uppercase mb-3"
                >
                  Gender
                </legend>
                <div class="flex flex-col gap-2">
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="gender"
                      value=""
                      checked
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span>All</span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="gender"
                      value="Female"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span>Female</span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="gender"
                      value="Male"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span class="flex items-center gap-2"> Male </span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="gender"
                      value="Genderless"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span class="flex items-center gap-2"> Genderless </span>
                  </label>
                  <label
                    class="flex items-center gap-2 text-white cursor-pointer hover:text-orange-400"
                  >
                    <input
                      type="radio"
                      name="gender"
                      value="unknown"
                      class="w-4 h-4 accent-orange-400 cursor-pointer"
                    />
                    <span class="flex items-center gap-2"> Unknown </span>
                  </label>
                  <div id="" class="bg-[#3c3e44] rounded-xl p-4 sticky top-20">
                    <button
                      type="submit"
                      class="w-full mt-4 py-3 rounded-xl bg-orange-400 text-[#23252b] font-bold text-lg hover:bg-orange-500 transition-colors cursor-pointer"
                    >
                      Apply
                    </button>
                  </div>
                </div>
              </fieldset>
            </form>
          </aside>

          <div
            class="flex-1 flex flex-wrap justify-center gap-6"
            id="character-cards"
          >

        </div>
      </section>

      <div class="flex justify-center my-12">
        <button
          id="load-more-btn"
          type="button"
          class="inline-flex items-center gap-3 rounded-xl bg-[#3c3e44] px-8 py-3 text-sm font-bold text-white shadow-lg duration-200 hover:-translate-y-0.5 hover:border-orange-400 hover:bg-orange-500/20 hover:text-orange-300 cursor-pointer"
        >
          <i class="fa-solid fa-rotate-right"></i>
          Load more

      </div>
    </main>
